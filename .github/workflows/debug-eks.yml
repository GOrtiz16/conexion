name: Debug EKS Connectivity

on:
  workflow_dispatch:   # lo ejecutas manualmente
  push:
    branches: [ main ] # opcional

jobs:
  debug-eks-connectivity:
    runs-on: ubuntu-latest

    steps:
      # - name: Install tools
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y dnsutils netcat-openbsd traceroute

      - name: Run connectivity tests
        run: |
          ENDPOINT="3FD81134248C71EB7F96492550274CF4.gr7.us-east-1.eks.amazonaws.com"

          echo "IP pública:"
          curl -s https://checkip.amazonaws.com

          echo "DNS:"
          nslookup $ENDPOINT || true

          echo "TCP:"
          timeout 5 bash -c "</dev/tcp/$ENDPOINT/443" && echo OK || echo FAIL

          echo "CURL:"
          curl -m 5 https://$ENDPOINT/version || true